apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: healthcare-ai-require-resource-limits
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-requests-and-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  app.kubernetes.io/part-of: healthcare-ai-platform
      validate:
        message: "Healthcare AI containers must define CPU and memory requests and limits."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
