apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthcare-ai-agent
  labels:
    app.kubernetes.io/name: healthcare-ai-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: healthcare-ai-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: healthcare-ai-agent
    spec:
      serviceAccountName: healthcare-ai-agent
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: healthcare-ai-agent
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: healthcare-ai-agent
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_MODE
              value: mock
            - name: AWS_REGION
              value: ap-south-1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
