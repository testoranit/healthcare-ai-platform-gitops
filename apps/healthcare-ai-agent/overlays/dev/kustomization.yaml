apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: healthcare-ai-dev

resources:
  - namespace.yaml
  - ../../base

images:
  - name: healthcare-ai-agent
    newName: 021655150740.dkr.ecr.ap-south-1.amazonaws.com/healthcare-ai-dev-agent
    newTag: initial

configMapGenerator:
  - name: healthcare-ai-agent-env
    literals:
      - APP_MODE=mock
      - AWS_REGION=ap-south-1

patches:
  - target:
      kind: Deployment
      name: healthcare-ai-agent
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: APP_MODE
            valueFrom:
              configMapKeyRef:
                name: healthcare-ai-agent-env
                key: APP_MODE
          - name: AWS_REGION
            valueFrom:
              configMapKeyRef:
                name: healthcare-ai-agent-env
                key: AWS_REGION
