apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: healthcare-ai-require-readonly-root-filesystem
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-readonly-root-filesystem
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  app.kubernetes.io/part-of: healthcare-ai-platform
      validate:
        message: "Healthcare AI containers must use a read-only root filesystem."
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true
