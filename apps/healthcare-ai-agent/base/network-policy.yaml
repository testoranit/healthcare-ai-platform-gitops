apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: healthcare-ai-agent
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: healthcare-ai-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
