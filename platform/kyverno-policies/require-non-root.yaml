apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: healthcare-ai-require-non-root
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-non-root-containers
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  app.kubernetes.io/part-of: healthcare-ai-platform
      validate:
        message: "Healthcare AI workloads must run as non-root."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
            containers:
              - securityContext:
                  runAsNonRoot: true
