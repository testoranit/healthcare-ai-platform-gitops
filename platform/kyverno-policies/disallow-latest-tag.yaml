apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: healthcare-ai-disallow-latest-tag
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: disallow-latest-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  app.kubernetes.io/part-of: healthcare-ai-platform
      validate:
        message: "Mutable latest image tags are not allowed."
        foreach:
          - list: "request.object.spec.containers"
            deny:
              conditions:
                any:
                  - key: "{{ element.image }}"
                    operator: Equals
                    value: "*:latest"
                  - key: "{{ contains(element.image, ':') }}"
                    operator: Equals
                    value: false
